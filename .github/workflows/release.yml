name: Release gem

# Builds the solid_web_ui gem whenever a version tag (e.g. v0.1.0) is pushed,
# attaches the .gem to a GitHub Release, and publishes it to RubyGems via OIDC
# Trusted Publishing (no API key / no secret, MFA-compatible).
#
# Setup (once, on rubygems.org): register a trusted publisher for solid_web_ui
# (GitHub repo doromones/solid-web, workflow release.yml). For the first, not-yet
# -published release use a "pending" trusted publisher.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for RubyGems trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Build gem
        run: |
          mkdir -p pkg
          gem build solid_web_ui.gemspec -o pkg/solid_web_ui.gem
          ls -l pkg

      - name: Create GitHub release with the gem attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" pkg/*.gem --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Configure RubyGems credentials (OIDC trusted publishing)
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      - name: Publish to RubyGems
        run: gem push pkg/solid_web_ui.gem
