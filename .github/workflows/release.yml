name: Release gems

# Builds the four gems whenever a version tag (e.g. v0.1.0) is pushed, attaches
# the .gem files to a GitHub Release, and publishes them to RubyGems via OIDC
# Trusted Publishing (no API key / no secret, MFA-compatible). solid_web_ui is
# pushed first, since the others depend on it.
#
# Setup (once, on rubygems.org): register a trusted publisher for EACH gem name
# (GitHub repo doromones/solid-web, workflow release.yml). For unpublished gems
# use a "pending" trusted publisher.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for RubyGems trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Build gems
        run: |
          mkdir -p pkg
          for gem in solid_web_ui solid_queue_web solid_cache_web solid_cable_web; do
            (cd "gems/$gem" && gem build "$gem.gemspec" -o "$GITHUB_WORKSPACE/pkg/$gem.gem")
          done
          ls -l pkg

      - name: Create GitHub release with the gems attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" pkg/*.gem --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Configure RubyGems trusted publishing
        uses: rubygems/configure-trusted-publisher@v1

      - name: Publish to RubyGems
        run: |
          for gem in solid_web_ui solid_queue_web solid_cache_web solid_cable_web; do
            gem push "pkg/$gem.gem"
          done
